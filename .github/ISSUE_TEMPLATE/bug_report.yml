name: Bug report
description: Report a reproducible defect in ProcessWatch.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce the issue.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which ProcessWatch version are you using?
      placeholder: "e.g. 1.5.1"
    validations:
      required: true

  - type: dropdown
    id: macos
    attributes:
      label: macOS version
      options:
        - macOS 14 Sonoma
        - macOS 15 Sequoia
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
      placeholder: Tell us what you saw and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch ProcessWatch
        2. Open ...
        3. Click ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, stack traces, or screenshots if available.
      render: shell
