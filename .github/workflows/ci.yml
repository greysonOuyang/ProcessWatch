name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-verify:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Environment diagnostics
        run: ./doctor.sh

      - name: Source and product checks
        run: ./scripts/review_product.sh

      - name: Logic tests
        run: ./scripts/test_logic.sh

      - name: Build unsigned app bundle
        run: ./build.sh --clean --no-sign
